apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      runtimeClassName: nvidia
      serviceAccountName: tailscale
      nodeSelector:
        kubernetes.io/hostname: k3s-master
      containers:
      - name: plex
        image: plexinc/pms-docker:latest
        ports:
        - containerPort: 32400
          name: plex-web
        - containerPort: 1900
          name: dlna
          protocol: UDP
        - containerPort: 5353
          name: discovery
          protocol: UDP
        - containerPort: 8324
          name: roku
        - containerPort: 32410
          name: gdm-1
          protocol: UDP
        - containerPort: 32412
          name: gdm-2
          protocol: UDP
        - containerPort: 32413
          name: gdm-3
          protocol: UDP
        - containerPort: 32414
          name: gdm-4
          protocol: UDP
        - containerPort: 32469
          name: dlna-tcp
        env:
        - name: TZ
          value: "Asia/Bangkok"
        - name: PLEX_CLAIM
          value: "claim-jkfyP9YN1rVSZP2nV_x3"
        - name: ADVERTISE_IP
          value: "https://plex.kanokgan.com:443,https://plex.dove-komodo.ts.net:443"
        - name: ALLOWED_NETWORKS
          value: "192.168.0.0/16,10.0.0.0/8"
        - name: PLEX_UID
          value: "1000"
        - name: PLEX_GID
          value: "1000"
        - name: PLEX_PREFERENCE_1
          value: "disableIPv6=1"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,video,utility"
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            nvidia.com/gpu: "1"
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: transcode
          mountPath: /transcode
        - name: media
          mountPath: /media
          readOnly: true
        - name: nrop
          mountPath: /nrop
          readOnly: true

      - name: tailscale
        image: ghcr.io/tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_KUBE_SECRET
          value: "plex-tailscale-state"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_HOSTNAME
          value: "plex"
        - name: TS_STATE_DIR
          value: /var/lib/tailscale
        - name: TS_SERVE_CONFIG
          value: /config/serve.json
        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale
        - name: tailscale-config
          mountPath: /config

      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: plex-config
      - name: transcode
        persistentVolumeClaim:
          claimName: plex-transcode
      - name: media
        nfs:
          server: 192.168.0.243
          path: /volume1/Media
          readOnly: true
      - name: nrop
        nfs:
          server: 192.168.0.243
          path: /volume1/Nrop
          readOnly: true
      - name: tailscale-state
        emptyDir: {}
      - name: tailscale-config
        configMap:
          name: tailscale-config
