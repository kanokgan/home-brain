# Tailscale Auth Secret Template
# 
# Generate a Tailscale auth key from: https://login.tailscale.com/admin/settings/keys
# - Enable "Reusable" 
# - Enable "Ephemeral"
# - Copy the tskey-auth-... key
#
# Create the secret with:
# kubectl create secret generic tailscale-auth \
#   --namespace plex \
#   --from-literal=TS_AUTHKEY="tskey-auth-XXXXXXXXX"
#
# Or apply this file after replacing REPLACE_WITH_YOUR_TAILSCALE_AUTH_KEY:

apiVersion: v1
kind: Secret
metadata:
  name: tailscale-auth
  namespace: plex
type: Opaque
stringData:
  TS_AUTHKEY: "tskey-auth-placeholder"
