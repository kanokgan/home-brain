apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-tailscale
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-tailscale
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-tailscale
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-tailscale
subjects:
- kind: ServiceAccount
  name: grafana-tailscale
  namespace: monitoring
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-tailscale-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-tailscale-serve-config
  namespace: monitoring
data:
  serve.json: |
    {
      "TCP": {
        "443": {
          "HTTPS": true
        }
      },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": {
            "/": {
              "Proxy": "http://kube-prometheus-grafana.monitoring.svc.cluster.local:80"
            }
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-tailscale-proxy
  namespace: monitoring
  labels:
    app: grafana-tailscale-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-tailscale-proxy
  template:
    metadata:
      labels:
        app: grafana-tailscale-proxy
    spec:
      serviceAccountName: grafana-tailscale
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        imagePullPolicy: Always
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_USERSPACE
          value: "false"
        - name: TS_STATE_DIR
          value: /var/lib/tailscale
        - name: TS_SERVE_CONFIG
          value: /config/serve.json
        - name: TS_HOSTNAME
          value: "monitoring"
        - name: TS_EXTRA_ARGS
          value: "--accept-routes"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale
        - name: tailscale-serve-config
          mountPath: /config
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
      volumes:
      - name: tailscale-state
        persistentVolumeClaim:
          claimName: grafana-tailscale-pvc
      - name: tailscale-serve-config
        configMap:
          name: grafana-tailscale-serve-config
