# Kube-Prometheus-Stack Helm Values
# Installs: Prometheus, Grafana, AlertManager, node-exporter, kube-state-metrics
# Access: https://monitoring.dove-komodo.ts.net (via Tailscale)

grafana:
  adminPassword: "admin"  # Change this!
  
  # Grafana configuration
  grafana.ini:
    server:
      domain: monitoring.dove-komodo.ts.net
      root_url: https://monitoring.dove-komodo.ts.net
      serve_from_sub_path: false
    
    # Allow embedding in iframes (useful for dashboards)
    security:
      allow_embedding: true
  
  # Persistent storage for dashboards and settings
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: local-path  # K3s default
  
  # Additional datasources
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
  
  # Sidecar configuration for Tailscale
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Data retention
    retention: 30d
    retentionSize: "18GB"
    
    # Resource requests
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi
    
    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    
    # Scrape interval
    scrapeInterval: 30s
    evaluationInterval: 30s
    
    # Service monitors for custom services
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    
    # Additional scrape configs for custom exporters
    additionalScrapeConfigs: []
    # Example: Add if you have NVIDIA DCGM exporter for GPU monitoring
    # - job_name: 'nvidia-dcgm'
    #   static_configs:
    #     - targets: ['dcgm-exporter.kube-system.svc:9400']

# AlertManager configuration
alertmanager:
  enabled: true
  
  alertmanagerSpec:
    # Persistent storage
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  
  # AlertManager configuration
  config:
    global:
      resolve_timeout: 5m
    
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'  # Change to your notification receiver
      routes:
        - receiver: 'null'
          matchers:
            - alertname =~ "InfoInhibitor|Watchdog"
    
    receivers:
      - name: 'null'
    
    # Add notification receivers here:
    # - name: 'telegram'
    #   telegram_configs:
    #     - bot_token: 'YOUR_BOT_TOKEN'
    #       chat_id: YOUR_CHAT_ID
    #       message: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# Node exporter - collects hardware metrics from each node
prometheus-node-exporter:
  hostRootFsMount:
    enabled: true
  
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# Kube-state-metrics - exposes cluster state metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

# Disable components you don't need (optional)
kubeApiServer:
  enabled: true
kubelet:
  enabled: true
kubeControllerManager:
  enabled: true
coreDns:
  enabled: true
kubeEtcd:
  enabled: false  # Usually not accessible in K3s
kubeScheduler:
  enabled: true
kubeProxy:
  enabled: true
kubeStateMetrics:
  enabled: true

# Default rules and alerts
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # K3s doesn't expose etcd metrics
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
